<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konten Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background: radial-gradient(circle at top, #111, #000);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

/* CONTAINER */
.wrapper{
width:100%;
max-width:360px;
padding:15px;
}

/* CARD */
.box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:18px;
padding:20px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
text-align:center;
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* IMAGE (NO BLUR) */
.preview{
width:100%;
aspect-ratio:1/1;
border-radius:14px;
overflow:hidden;
margin-bottom:15px;
}

.preview img{
width:100%;
height:100%;
object-fit:cover;
}

/* TITLE */
.title{
font-size:18px;
font-weight:600;
margin-bottom:5px;
}

.sub{
font-size:13px;
opacity:0.7;
margin-bottom:15px;
}

/* BUTTON */
.open{
display:block;
padding:14px;
border-radius:12px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:#fff;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.open:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="wrapper">
  <div class="box">

    <div class="preview">
      <img id="img">
    </div>

    <div class="title">🎬 Konten Siap Dibuka</div>
    <div class="sub">Klik tombol di bawah untuk lanjut</div>

    <a id="openLink" target="_blank" class="open">
      ▶ Nonton / Download Sekarang
    </a>

  </div>
</div>

<script>

/* AMBIL ID */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* LOAD DATA */
fetch('../data/data.json')
.then(r=>r.json())
.then(data=>{

  const item = data.find(x=>x.id===id);

  if(!item){
    document.body.innerHTML="Konten tidak ditemukan";
    return;
  }

  document.getElementById("img").src = item.img;

  /* LINK ASLI DI SINI (tidak ditampilkan di UI sebelumnya) */
  document.getElementById("openLink").href = item.link;

});
</script>

</body>
</html>
