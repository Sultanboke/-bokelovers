<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Access</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#000;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:#fff;
}

/* FIX HEIGHT NO SHIFT */
.wrapper{
width:100%;
max-width:360px;
padding:15px;
}

/* CARD */
.box{
background:#111;
padding:20px;
border-radius:16px;
text-align:center;
}

/* IMAGE */
.preview{
width:100%;
aspect-ratio:1/1;
border-radius:12px;
overflow:hidden;
margin-bottom:15px;
}

.preview canvas{
width:100%;
height:100%;
}

/* BUTTON */
.btn{
display:block;
padding:14px;
background:linear-gradient(135deg,#22c55e,#16a34a);
border-radius:12px;
color:#fff;
text-decoration:none;
font-weight:600;
}

.title{
margin-bottom:10px;
font-weight:600;
}

</style>
</head>

<body oncontextmenu="return false">

<div class="wrapper">
  <div class="box">

    <div class="preview">
      <canvas id="canvas"></canvas>
    </div>

    <div class="title">Ready to Access</div>

    <a id="openBtn" target="_blank" class="btn">
      ▶ Watch / Open Now
    </a>

  </div>
</div>

<script>

const params = new URLSearchParams(location.search);
const id = params.get("id");

fetch('../data/data.json')
.then(r=>r.json())
.then(data=>{

  const item = data.find(x=>x.id===id);
  if(!item) return;

  draw(atob(item.img));

  document.getElementById("openBtn").href = item.link;

});

function draw(url){
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.crossOrigin="anonymous";
  img.src = url;

  img.onload = ()=>{
    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);
  };
}

</script>

</body>
</html>
