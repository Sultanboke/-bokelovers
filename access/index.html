<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock Access</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#000;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:#fff;
}

.box{
width:100%;
max-width:360px;
background:#111;
padding:20px;
border-radius:16px;
text-align:center;
}

/* CANVAS */
.preview{
width:100%;
aspect-ratio:1/1;
border-radius:12px;
overflow:hidden;
margin-bottom:15px;
}

canvas{
width:100%;
height:100%;
}

/* TEXT */
.title{
font-size:18px;
font-weight:600;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:#fff;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

.pay{
display:block;
margin-bottom:10px;
padding:10px;
background:#f59e0b;
color:#000;
border-radius:10px;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body oncontextmenu="return false">

<div class="box">

  <div class="preview">
    <canvas id="canvas"></canvas>
  </div>

  <div class="title">Premium Locked Content</div>

  <a href="https://telebokep.com/accesscode/" target="_blank" class="pay">
    Pay 5 USDT
  </a>

  <input id="code" placeholder="Enter access code">

  <button onclick="unlock()">Unlock Now</button>

</div>

<script>

const MASTER_CODE = "VIP123";

const params = new URLSearchParams(location.search);
const id = params.get("id");

let currentItem = null;

fetch('../data/data.json')
.then(r=>r.json())
.then(data=>{

  const item = data.find(x=>x.id===id);
  if(!item) return;

  currentItem = item;

  draw(atob(item.img));

  const unlocked = JSON.parse(localStorage.getItem("unlocked")||"{}");

  if(unlocked["ALL"]){
    location.href = "../view/?id=" + item.id;
  }

});

function draw(url){
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.crossOrigin="anonymous";
  img.src = url;

  img.onload = ()=>{
    canvas.width = img.width;
    canvas.height = img.height;

    ctx.filter = "blur(12px)";
    ctx.drawImage(img,0,0);
  };
}

function unlock(){
  const code = document.getElementById("code").value.trim();

  if(code === MASTER_CODE){

    localStorage.setItem("unlocked", JSON.stringify({ALL:true}));

    location.href = "../view/?id=" + currentItem.id;

  } else {
    alert("Invalid code");
  }
}

</script>

</body>
</html>
