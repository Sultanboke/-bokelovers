<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Telegram</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    padding: 20px;
}

/* Text atas */
.top-text {
    font-size: 5vw;
    line-height: 1.5;
    font-style: italic;
}

/* GRATIS */
.gratis {
    display: block;
    margin-top: 10px;
}

/* Panah */
.arrow {
    font-size: 12vw;
    color: red;
    margin: 30px 0;
    animation: bounce 1s infinite;
}

/* Animasi panah */
@keyframes bounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(20px); }
    100% { transform: translateY(0); }
}

/* Link bawah */
.cta {
    font-size: 6vw;
    font-weight: bold;
    color: gold;
    text-decoration: none;
    line-height: 1.4;
    display: inline-block;
}

.cta:hover {
    opacity: 0.8;
}

/* Desktop */
@media (min-width: 768px) {
    .top-text { font-size: 28px; }
    .arrow { font-size: 80px; }
    .cta { font-size: 32px; }
}

/* NOTIFICATION ATAS */
.notif {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%) translateY(-100%);
    background: rgba(0,0,0,0.95);
    color: white;
    padding: 12px 18px;
    border-radius: 0 0 10px 10px;
    font-size: 14px;
    text-align: center;
    width: 100%;
    max-width: 500px;
    opacity: 0;
    transition: all 0.5s ease;
    border-bottom: 2px solid #444;
    z-index: 999;
}

.notif.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<div class="container">

    <div class="top-text">
        Semua Asupan <br>
        Di Channel Telegram <br>
        <span class="gratis">GRATIS</span>
    </div>

    <div class="arrow">⬇️</div>

    <a href="https://t.me/+eJ1uADPjbNEwYjE1" target="_blank" class="cta">
        Klik disini <br>
        Join Telegram
    </a>

</div>

<!-- NOTIFICATION -->
<div id="notif" class="notif">
    Kami tidak menyediakan channel VVIP, grup rahasia, maupun akses tidak resmi lainnya.<br>
    Seluruh konten tersedia gratis dan dapat ditonton melalui situs web resmi kami.
</div>

<!-- SOUND -->
<audio id="notifSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>

<script>
const notif = document.getElementById("notif");
const sound = document.getElementById("notifSound");

function showNotif() {
    notif.classList.add("show");

    // play sound
    sound.currentTime = 0;
    sound.play().catch(() => {});

    setTimeout(() => {
        notif.classList.remove("show");
    }, 2500);
}

// tiap 3 detik
setInterval(showNotif, 3000);

// pertama kali
setTimeout(showNotif, 1000);
</script>

</body>
</html>
