<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT Voting</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#000,#111);
    color:white;
    text-align:center;
}

/* PAGE */
.page {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.active { display:flex; }

/* TITLE */
h1 { margin-bottom:30px; }

/* BUTTON */
.btn {
    background:white;
    color:black;
    padding:15px;
    margin:10px;
    width:260px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}
.btn:hover { transform:scale(1.05); }

/* LOADING */
.loader {
    border:6px solid #333;
    border-top:6px solid white;
    border-radius:50%;
    width:60px;
    height:60px;
    animation:spin 1s linear infinite;
}
@keyframes spin {100%{transform:rotate(360deg);}}

/* RESULT */
.card { width:260px; margin:10px; text-align:left; }

.bar {
    background:#333;
    height:20px;
    border-radius:10px;
    overflow:hidden;
}
.fill {
    height:100%;
    background:limegreen;
    width:0%;
    transition:1s;
}

/* TELEGRAM */
.join {
    color:#00ffcc;
    font-size:28px;
    animation:pulse 1s infinite;
    cursor:pointer;
}
@keyframes pulse {50%{transform:scale(1.1);}}

/* FAIL */
.fail {
    color:orange;
    font-size:22px;
    line-height:1.5;
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <h1>🔥 Who's The GOAT?</h1>
    <div class="btn" onclick="vote('ronaldo')">Cristiano Ronaldo</div>
    <div class="btn" onclick="vote('messi')">Lionel Messi</div>
</div>

<!-- LOADING -->
<div id="loadingPage" class="page">
    <h1>Menghitung suara...</h1>
    <div class="loader"></div>
</div>

<!-- RESULT -->
<div id="resultPage" class="page">
    <h2>Hasil Voting</h2>

    <div class="card">
        Ronaldo (<span id="rScore"></span>)
        <div class="bar"><div id="rBar" class="fill"></div></div>
    </div>

    <div class="card">
        Messi (<span id="mScore"></span>)
        <div class="bar"><div id="mBar" class="fill"></div></div>
    </div>
</div>

<!-- WIN -->
<div id="page2" class="page">
    <h1 class="join" onclick="goTG()">🚀 JOIN TELEGRAM</h1>
</div>

<!-- LOSE -->
<div id="page3" class="page">
    <h1 class="fail">
        ❌ Suara kamu kalah<br>
        Coba lagi besok
    </h1>
</div>

<script>

const TELEGRAM = "https://t.me/+_USPbo5cDCowM2Q1";

// Ambil data dari localStorage
function getVotes(){
    let data = localStorage.getItem("votes");
    if(!data){
        let initial = {
            ronaldo: 120,
            messi: 110
        };
        localStorage.setItem("votes", JSON.stringify(initial));
        return initial;
    }
    return JSON.parse(data);
}

// Simpan data
function saveVotes(data){
    localStorage.setItem("votes", JSON.stringify(data));
}

function vote(choice){

    showPage("loadingPage");

    setTimeout(()=>{

        let data = getVotes();

        // Tambah suara
        if(choice === "ronaldo"){
            data.ronaldo += Math.floor(Math.random()*3)+1;
        } else {
            data.messi += Math.floor(Math.random()*3)+1;
        }

        saveVotes(data);

        let total = data.ronaldo + data.messi;

        let rPercent = Math.round((data.ronaldo/total)*100);
        let mPercent = Math.round((data.messi/total)*100);

        document.getElementById("rScore").innerText = data.ronaldo;
        document.getElementById("mScore").innerText = data.messi;

        showPage("resultPage");

        setTimeout(()=>{
            document.getElementById("rBar").style.width = rPercent+"%";
            document.getElementById("mBar").style.width = mPercent+"%";
        },200);

        setTimeout(()=>{
            let winner = data.ronaldo > data.messi ? "ronaldo" : "messi";

            if(choice === winner){
                showPage("page2");
            } else {
                showPage("page3");
            }
        },3000);

    },1500);
}

function goTG(){
    window.location.href = TELEGRAM;
}

function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
