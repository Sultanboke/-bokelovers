<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Access</title>

<!-- PREMIUM FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at top, #0a0a0a, #050505);
  color: white;
  overflow: hidden;
}

/* PARTICLE */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MAIN */
.container {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: fadeIn 1.5s ease;
  width: 90%;
  max-width: 420px;
}

/* HEADLINE */
.title {
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.6;
  margin-bottom: 25px;
}

/* BUTTON */
.btn {
  display: block;
  padding: 18px;
  margin: 12px 0;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 500;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.15);
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

/* HOVER */
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 20px currentColor;
}

/* COLORS */
.japanese { color: #ff4d4d; }
.indo { color: #ff0000; }
.western { color: #4da6ff; }

/* LIVE VIEW */
.live {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 12px;
  opacity: 0.7;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.85);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* MODAL */
.modal {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.modal-content {
  text-align: center;
  padding: 30px;
  border-radius: 14px;
  background: #111;
  box-shadow: 0 0 40px rgba(255,0,0,0.3);
}

.modal button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: #ff4d4d;
  color: white;
  font-weight: 500;
  cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, -55%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="live" id="live">● 128 online</div>

<!-- 21+ -->
<div class="modal" id="warning">
  <div class="modal-content">
    <h2>21+ Only</h2>
    <p style="opacity:0.6;">Restricted content. Continue if eligible.</p>
    <button onclick="enterSite()">Enter</button>
  </div>
</div>

<div class="container">

  <div class="title">Private Channel Access</div>
  <div class="subtitle">Limited access available</div>

  <a href="https://t.me/+ydd_4nMmWM4xMzA1" class="btn japanese">
    TB JAPANESE 🇯🇵
  </a>

  <a href="https://t.me/+Oq5_fbkVFLI1NzY1" class="btn indo">
    TB INDO 🇮🇩
  </a>

  <a href="https://t.me/+lVSZPNj8WLNiNDNl" class="btn western">
    TB WESTERN 🇬🇧
  </a>

</div>

<script>
/* ENTER */
function enterSite() {
  document.getElementById('warning').style.display = 'none';
}

/* PARTICLE */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    d: Math.random() * 1
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });

  particles.forEach(p => {
    p.y += p.d;
    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });
}

setInterval(draw, 30);

/* LIVE VIEW */
let viewers = 120;
setInterval(() => {
  viewers += Math.floor(Math.random() * 4 - 1);
  document.getElementById("live").innerText = "● " + viewers + " online";
}, 3000);

/* SIMPLE JOIN NOTIF */
const msgs = [
  "1 orang baru join TB JAPANESE 🇯🇵",
  "3 orang baru join TB INDO 🇮🇩",
  "1 orang baru join TB WESTERN 🇬🇧",
  "3 orang baru join TB JAPANESE 🇯🇵"
];

function showToast() {
  const t = document.createElement("div");
  t.className = "toast";
  t.innerText = msgs[Math.floor(Math.random() * msgs.length)];

  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

setInterval(showToast, 4000);
</script>

</body>
</html>
