<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telebokep Gallery</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{--main-color:#0088cc;}

html, body{overflow-x:hidden;max-width:100vw;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:#0b0b0b;color:white;padding-top:40px;}

.sticky-banner{
position:fixed;top:0;width:100%;
background:linear-gradient(90deg,#0ea5e9,#2563eb);
color:white;font-size:12px;padding:6px;
z-index:9999;overflow:hidden;white-space:nowrap;cursor:pointer;
}

.marquee{display:inline-block;padding-left:100%;animation:scroll 12s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

body::before{
content:"";position:fixed;width:100%;height:100%;
background:radial-gradient(circle at 50% 10%, rgba(0,150,255,0.12), transparent 70%);
z-index:-1;
}

.header{
text-align:center;padding:25px;font-size:56px;
font-family:'Bebas Neue', sans-serif;
letter-spacing:4px;color:var(--main-color);
transform:skewX(-12deg);
animation:logoPulse 2s ease-in-out infinite alternate;
}

@keyframes logoPulse{
0%{transform:skewX(-12deg) scale(1);}
100%{transform:skewX(-12deg) scale(1.04);}
}

.online{text-align:center;font-size:13px;color:#00ffc6;margin-bottom:10px;}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;padding:12px;
}

.card{
background:#111;border-radius:12px;
overflow:hidden;cursor:pointer;
transition:0.25s;
}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.6);}

.img-box canvas{width:100%;height:130px;object-fit:cover;}

.card-info{
text-align:center;font-size:12px;
padding:6px;background:#0ea5e9;font-weight:600;
}

/* PAGINATION */
#pagination{
text-align:center;
padding:10px;
}
#pagination button{
margin:3px;
padding:6px 10px;
border:none;
border-radius:6px;
background:#222;
color:#fff;
cursor:pointer;
}
#pagination .active{
background:var(--main-color);
}

/* POPUP DLL (TETAP) */
.force-popup{position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:10000;}

.force-box{background:#121212;padding:25px;border-radius:16px;text-align:center;width:85%;max-width:320px;}

.join-btn{display:block;margin-top:15px;padding:12px;border-radius:12px;background:#0088cc;color:white;text-decoration:none;font-weight:600;}

.preview{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:9999;}

.preview-box{width:90%;max-width:380px;background:#111;padding:20px;border-radius:16px;text-align:center;}

.toast{position:fixed;bottom:20px;right:-300px;background:#111;padding:12px;border-radius:12px;transition:0.5s;}
.toast.show{right:20px;}
</style>
</head>

<body>

<div class="sticky-banner" onclick="window.open('https://t.me/+jhoktmNhrtQzYjA1')">
<div class="marquee" id="bannerText"></div>
</div>

<div class="header">TELEBOKEP</div>
<div class="online">🟢 <span id="onlineCount">0</span> online</div>

<div id="list" class="container"></div>
<div id="pagination"></div>

<div id="toast" class="toast"></div>

<script>

/* anti */
document.addEventListener("contextmenu", e=>e.preventDefault());

/* banner */
const texts=[
"🔥 Update konten setiap hari",
"🚀 Akses lebih cepat via Telegram",
"✨ Simpan halaman ini",
"💎 Konten eksklusif setiap hari"
];
bannerText.innerText=texts[Math.floor(Math.random()*texts.length)];

/* pagination setup */
const list=document.getElementById("list");
const pagination=document.getElementById("pagination");

let allData=[];
let currentPage=1;
let perPage=12;

/* load data */
fetch('data.json')
.then(r=>r.json())
.then(data=>{
allData=data.reverse();
renderPage(1);
});

/* render page */
function renderPage(page){
currentPage=page;

let start=(page-1)*perPage;
let end=start+perPage;

let html="";

allData.slice(start,end).forEach(item=>{
let encoded=btoa(item.img);

html+=`
<div class="card" onclick="openPreview('${item.link}')">
<div class="img-box" data-img="${encoded}"></div>
<div class="card-info">▶ WATCH</div>
</div>`;
});

list.innerHTML=html;
renderPagination();

/* canvas */
document.querySelectorAll('.img-box').forEach(el=>{
let img=new Image();
img.src=atob(el.dataset.img);

img.onload=()=>{
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=300;
canvas.height=200;

ctx.drawImage(img,0,0,300,200);
el.appendChild(canvas);
};
});
}

/* pagination button */
function renderPagination(){
let totalPage=Math.ceil(allData.length/perPage);
let html="";

if(currentPage>1){
html+=`<button onclick="renderPage(${currentPage-1})">⬅</button>`;
}

for(let i=1;i<=totalPage;i++){
html+=`<button onclick="renderPage(${i})" class="${i===currentPage?'active':''}">${i}</button>`;
}

if(currentPage<totalPage){
html+=`<button onclick="renderPage(${currentPage+1})">➡</button>`;
}

pagination.innerHTML=html;
}

/* online */
let online=120;
setInterval(()=>{
online+=Math.random()*10-5;
onlineCount.innerText=Math.floor(online);
},2000);

</script>

</body>
</html>
