<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telebokep Gallery</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
background:#0d0d0d;
color:white;
padding-top:40px;
}

/* 🔥 DARK NEON BG */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 20%, rgba(0,150,255,0.15), transparent 70%);
z-index:-1;
}

/* SHIMMER */
.skeleton{
width:100%;
height:130px;
background:linear-gradient(90deg,#1a1a1a,#2a2a2a,#1a1a1a);
background-size:200% 100%;
animation:shimmer 1.2s infinite;
}
@keyframes shimmer{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

/* ONLINE */
.online{
text-align:center;
font-size:14px;
color:#00ffc6;
text-shadow:0 0 12px rgba(0,255,200,0.9);
animation:blink 1.5s infinite;
}
@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.5;}
}

/* CARD */
.container{display:grid;gap:12px;padding:12px;}
.container{grid-template-columns:repeat(3,1fr);}

.card{
background:#111;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(0,150,255,0.2);
}
.card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 0 20px rgba(0,150,255,0.6);
}

.card img{width:100%;height:130px;object-fit:cover;}

/* WATCH */
.card-info{
text-align:center;
font-size:12px;
padding:6px;
background:#0088cc;
animation:pulse 1.2s infinite;
}
@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

/* POPUP */
.preview{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(12px);
}

.preview-box{
width:90%;
max-width:400px;
padding:20px;
background:#111;
border-radius:14px;
box-shadow:0 0 25px rgba(0,150,255,0.5);
}

.preview-btn{
flex:1;
padding:12px;
border-radius:10px;
text-align:center;
color:white;
text-decoration:none;
}
.watch{background:#22c55e;}
.download{background:#3b82f6;}

.preview-actions{display:flex;gap:10px;}

.close-btn{text-align:center;margin-top:10px;cursor:pointer;}

</style>
</head>

<body>

<div class="online">🟢 <span id="onlineCount">0</span> ONLINE</div>

<div id="list" class="container"></div>

<div id="preview" class="preview">
<div class="preview-box">

<div class="preview-text">
Konten berasal dari sumber publik.<br><br>
Lanjutkan untuk akses penuh melalui Telegram.
</div>

<div class="preview-actions">
<a id="watchBtn" class="preview-btn watch">▶ WATCH</a>
<a href="https://t.me/+jhoktmNhrtQzYjA1" class="preview-btn download">🚀 TELEGRAM</a>
</div>

<div class="close-btn" onclick="closePreview()">Tutup</div>

</div>
</div>

<script>

/* SHIMMER LOAD */
let skeletonHTML="";
for(let i=0;i<9;i++){
skeletonHTML+=`<div class="skeleton"></div>`;
}
list.innerHTML=skeletonHTML;

fetch('data.json')
.then(r=>r.json())
.then(data=>{
let html="";
data.reverse().forEach(item=>{
html+=`
<div class="card" onclick="openPreview('${item.link}')">
<img src="${item.img}">
<div class="card-info">▶ WATCH</div>
</div>`;
});
setTimeout(()=>{list.innerHTML=html;},500);
});

/* POPUP */
function openPreview(link){
preview.style.display="flex";
watchBtn.href=link;
}

/* 🔥 AUTOPLAY POPUP */
setTimeout(()=>{
preview.style.display="flex";
},4000);

function closePreview(){
preview.style.display="none";
}

/* ONLINE */
let online=100;
setInterval(()=>{
online+=Math.random()*10-5;
onlineCount.innerText=Math.floor(online);
},2000);

</script>

</body>
</html>
