<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Viral</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

/* PAGE */
.page {
    display:none;
    min-height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}
.active { display:flex; }

/* BUTTON */
.btn {
    background:white;
    color:black;
    padding:15px;
    margin:10px;
    width:280px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    border-radius:10px;
}

/* RESULT */
.row {
    background:#eee;
    color:black;
    width:300px;
    margin:10px;
    padding:15px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

/* TEXT */
.red { color:red; }
.orange { color:orange; }

.pulse {
    animation:pulse 1s infinite;
}
@keyframes pulse {
    50% { transform:scale(1.1); }
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <h2>🔞 Khusus 18+</h2>
    <h1>Collector mana yang kamu suka?</h1>

    <div class="btn" onclick="vote('indo')">Asupan Indo</div>
    <div class="btn" onclick="vote('japan')">Asupan Japan</div>
    <div class="btn" onclick="vote('barat')">Asupan Barat</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
    <h1 class="red">🔥 Hasil Voting</h1>

    <div class="row">Indo <span id="indo"></span></div>
    <div class="row">Japan <span id="japan"></span></div>
    <div class="row">Barat <span id="barat"></span></div>

    <h3 id="timer"></h3>
</div>

<!-- PAGE 3 (GATE IKLAN) -->
<div id="page3" class="page">
    <h2 class="orange">⚠️ Verifikasi Diperlukan</h2>
    <p>Untuk melihat hasil lengkap & akses grup</p>

    <div class="btn pulse" onclick="goAds()">UNLOCK SEKARANG</div>

    <p style="font-size:12px;">(Langkah terakhir)</p>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page">
    <h1 class="red pulse">⬇ Klik Disini ⬇</h1>
    <h1 class="red" onclick="goTG()">Join Channel Telegram</h1>
</div>

<script>

const IKLAN = "https://s.shopee.co.id/7VCDMtmdb5";
const TELEGRAM = "https://t.me/+_USPbo5cDCowM2Q1";

// DATA LOCAL
function getData(){
    let data = localStorage.getItem("cuanSurvey");
    if(!data){
        let init = {
            indo: 120,
            japan: 115,
            barat: 110,
            voted: false
        };
        localStorage.setItem("cuanSurvey", JSON.stringify(init));
        return init;
    }
    return JSON.parse(data);
}

function saveData(data){
    localStorage.setItem("cuanSurvey", JSON.stringify(data));
}

// VOTE
function vote(choice){

    let data = getData();

    if(data.voted){
        alert("Kamu sudah vote!");
        return;
    }

    // manipulasi biar terlihat ramai
    data[choice] += Math.floor(Math.random()*10)+5;
    data.indo += Math.floor(Math.random()*3);
    data.japan += Math.floor(Math.random()*3);
    data.barat += Math.floor(Math.random()*3);

    data.voted = true;
    saveData(data);

    showResult();
}

// RESULT
function showResult(){

    let data = getData();

    showPage("page2");

    animate("indo", data.indo);
    animate("japan", data.japan);
    animate("barat", data.barat);

    let time = 5;
    let timer = setInterval(()=>{
        document.getElementById("timer").innerText =
            "⏳ Membuka akses dalam " + time + " detik...";
        time--;

        if(time < 0){
            clearInterval(timer);
            showPage("page3");
        }
    },1000);
}

// ANIMASI ANGKA
function animate(id, target){
    let el = document.getElementById(id);
    let count = 0;

    let i = setInterval(()=>{
        count += Math.ceil(target/20);
        if(count >= target){
            count = target;
            clearInterval(i);
        }
        el.innerText = count;
    },50);
}

// IKLAN (WAJIB KLIK)
function goAds(){
    window.location.href = IKLAN;

    // setelah user balik
    setTimeout(()=>{
        showPage("page4");
    },4000);
}

// TELEGRAM
function goTG(){
    window.location.href = TELEGRAM;
}

// SWITCH PAGE
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
