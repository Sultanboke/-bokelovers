<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT Survey</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
}

.page {
    display: none;
    padding: 50px 20px;
}

.active {
    display: block;
}

h1 {
    font-size: 40px;
}

.btn {
    background: white;
    color: black;
    padding: 15px;
    margin: 20px auto;
    width: 300px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
}

.result {
    display: flex;
    justify-content: space-between;
    background: white;
    color: black;
    padding: 15px;
    margin: 20px auto;
    width: 300px;
    font-size: 20px;
    font-weight: bold;
}

.red {
    color: red;
    font-size: 28px;
}
</style>

</head>
<body>

<!-- HALAMAN 1 -->
<div id="page1" class="page active">
    <h1>Who's the GOAT?</h1>

    <div class="btn" onclick="vote('ronaldo')">Cristiano Ronaldo</div>
    <div class="btn" onclick="vote('messi')">Lionel Messi</div>
</div>

<!-- HALAMAN HASIL -->
<div id="resultPage" class="page">
    <h1>Hasil Voting</h1>

    <div class="result">
        <span>Cristiano Ronaldo</span>
        <span id="ronaldoScore">100</span>
    </div>

    <div class="result">
        <span>Lionel Messi</span>
        <span id="messiScore">50</span>
    </div>
</div>

<!-- HALAMAN 2 -->
<div id="page2" class="page">
    <h1 class="red">KLIK DISINI</h1>
    <h1 class="red">JOIN CHANNEL TELEGRAM</h1>
</div>

<!-- HALAMAN 3 -->
<div id="page3" class="page">
    <h1 style="color: orange;">
        Maaf suara anda tidak cukup <br>
        Untuk Goat yg anda pilih <br>
        Coba lagi besok
    </h1>
</div>

<script>

function vote(choice) {

    // random biar terlihat real
    let ronaldo = Math.floor(Math.random() * 200) + 50;
    let messi = Math.floor(Math.random() * 200) + 50;

    document.getElementById("ronaldoScore").innerText = ronaldo;
    document.getElementById("messiScore").innerText = messi;

    showPage("resultPage");

    setTimeout(() => {

        let winner = ronaldo > messi ? "ronaldo" : "messi";

        if (choice === winner) {
            showPage("page2");
        } else {
            showPage("page3");
        }

    }, 2000);
}

function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
