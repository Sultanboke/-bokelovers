<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telebokep Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0d0d0d;color:white;padding-top:40px;}

.sticky-banner{
position:fixed;top:0;width:100%;
background:#0088cc;color:white;
text-align:center;padding:8px;font-size:13px;z-index:9999;
}
.header{text-align:center;padding:20px;font-size:20px;font-weight:700;
background:linear-gradient(90deg,#ff416c,#ff4b2b);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.topbar{display:flex;gap:10px;justify-content:center;padding:10px;}
.tg-btn{padding:8px 12px;border-radius:8px;text-decoration:none;color:white;font-size:13px;}
.jap{background:#229ED9;}
.indo{background:#0088cc;}

.online{text-align:center;font-size:13px;opacity:0.8;margin-bottom:10px;}

.container{display:grid;gap:12px;padding:12px;}
@media (min-width:0px){.container{grid-template-columns:repeat(3,1fr);}}
@media (min-width:600px){.container{grid-template-columns:repeat(4,1fr);}}
@media (min-width:900px){.container{grid-template-columns:repeat(5,1fr);}}

.card{background:#1a1a1a;border-radius:12px;overflow:hidden;}
.card canvas{width:100%;height:130px;object-fit:cover;}

.actions{display:flex;gap:6px;padding:6px;}
.btn{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;background:#2a2a2a;}

.pagination{display:flex;justify-content:center;gap:8px;padding:20px;}
.page-btn{padding:8px 12px;background:#222;border-radius:6px;cursor:pointer;}
.page-btn.active{background:#ff416c;}

.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;align-items:center;justify-content:center;
z-index:9999;
}

.popup-box{
background:#111;padding:25px;border-radius:15px;text-align:center;
width:85%;max-width:320px;
}

.toast{
position:fixed;bottom:20px;left:20px;
background:#1a1a1a;padding:10px 15px;
border-radius:8px;font-size:13px;display:none;
}

/* FORCE JOIN */
#forceJoin{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
}
</style>
</head>

<body>

<div class="sticky-banner">
🚀 Join Telegram
</div>

<div class="header">🔥 TELEBOKEP GALLERY 🔥</div>

<div class="topbar">
<a href="#" class="tg-btn jap">Japanese</a>
<a href="#" class="tg-btn indo">Indo Viral</a>
</div>

<div class="online">🟢 <span id="onlineCount">0</span> online</div>

<div id="list" class="container"></div>
<div id="pagination" class="pagination"></div>

<!-- FORCE JOIN -->
<div id="forceJoin">
<div class="popup-box">
<h3>🚀 Join Telegram</h3>
<p>Gabung untuk membuka semua konten</p>
<a href="#" onclick="joined()" class="tg-btn indo">JOIN SEKARANG</a>
</div>
</div>

<div id="toast" class="toast"></div>

<script>

/* 🔒 ANTI */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("dragstart",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
if(e.keyCode==123) return false;
if(e.ctrlKey && e.shiftKey && e.keyCode==73) return false;
});

/* DATA */
let perPage=15;
let currentPage=1;
let allData=[];

fetch('data.json')
.then(r=>r.json())
.then(data=>{
allData=data.reverse();
renderPage(1);
renderPagination();
});

/* RENDER */
function renderPage(page){
let container=document.getElementById("list");
container.innerHTML="";

let start=(page-1)*perPage;
let items=allData.slice(start,start+perPage);

items.forEach(item=>{
let card=document.createElement("div");
card.className="card";

/* canvas image */
let img=new Image();
img.src=atob(item.img);

img.onload=()=>{
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);
card.appendChild(canvas);
};

card.innerHTML+=`
<div class="actions">
<a href="${atob(item.link)}" target="_blank" class="btn">▶</a>
<a href="${atob(item.link)}" target="_blank" class="btn">⬇</a>
</div>
`;

container.appendChild(card);
});

currentPage=page;
updateActive();
}

/* PAGINATION */
function renderPagination(){
let totalPages=Math.ceil(allData.length/perPage);
let pagination=document.getElementById("pagination");
pagination.innerHTML="";
for(let i=1;i<=totalPages;i++){
pagination.innerHTML+=`<div class="page-btn" onclick="renderPage(${i})">${i}</div>`;
}
}
function updateActive(){
document.querySelectorAll(".page-btn").forEach((btn,i)=>{
btn.classList.toggle("active",i+1===currentPage);
});
}

/* ONLINE */
let online=100;
setInterval(()=>{
online+=Math.floor(Math.random()*10)-5;
document.getElementById("onlineCount").innerText=online;
},2000);

/* 🔥 FORCE JOIN DELAY */
setTimeout(()=>{
if(!localStorage.getItem("joined")){
document.getElementById("forceJoin").style.display="flex";
}
},3000);

function joined(){
localStorage.setItem("joined","true");
document.getElementById("forceJoin").style.display="none";
}

/* 🔥 TOAST */
function showToast(){
let toast=document.getElementById("toast");
toast.innerText=Math.floor(Math.random()*5+1)+" orang join Telegram";
toast.style.display="block";
setTimeout(()=>toast.style.display="none",3000);
}
setInterval(showToast,7000);

/* 🔥 ANTI BOT */
if(navigator.webdriver){
document.body.innerHTML="Blocked";
}

</script>

</body>
</html>
