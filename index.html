<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telebokep Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0d0d0d;color:white;padding-top:40px;overflow-x:hidden;}

/* STICKY */
.sticky-banner{
position:fixed;top:0;width:100%;
background:#0088cc;color:white;
text-align:center;padding:8px;
font-size:13px;z-index:9999;
}

/* HEADER */
.header{
text-align:center;padding:20px;font-size:20px;font-weight:700;
background:linear-gradient(90deg,#ff416c,#ff4b2b);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* BUTTON */
.topbar{display:flex;gap:10px;justify-content:center;padding:10px;}
.tg-btn{padding:8px 12px;border-radius:8px;text-decoration:none;color:white;font-size:13px;}
.jap{background:#229ED9;}
.indo{background:#0088cc;}

/* ONLINE */
.online{text-align:center;font-size:13px;opacity:0.8;margin-bottom:10px;}

/* GRID */
.container{display:grid;gap:12px;padding:12px;grid-template-columns:repeat(3,1fr);}

/* CARD */
.card{background:#1a1a1a;border-radius:12px;overflow:hidden;}

/* CANVAS (ANTI DOWNLOAD) */
.img-box canvas{
width:100%;
height:130px;
object-fit:cover;
pointer-events:none;
}

/* ACTION */
.actions{display:flex;gap:6px;padding:6px;}
.btn{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;background:#2a2a2a;}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:10px;padding:20px;}
.page-btn{padding:8px 12px;background:#222;border-radius:6px;cursor:pointer;}
.page-btn.active{background:#ff416c;}

/* POPUP */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;align-items:center;justify-content:center;
z-index:99999;
}
.popup-box{
background:#111;padding:25px;border-radius:15px;text-align:center;
width:85%;max-width:320px;
}
.popup-btn{
display:block;margin:10px 0;padding:10px;
border-radius:8px;text-decoration:none;color:white;
background:#0088cc;
}
.close-btn{margin-top:10px;color:#aaa;cursor:pointer;}

/* TOAST */
.toast{
position:fixed;bottom:20px;left:20px;
background:#1a1a1a;padding:10px 15px;
border-radius:8px;font-size:13px;
display:none;
}

/* FOOTER */
.footer{
text-align:center;padding:20px;font-size:12px;
opacity:0.6;border-top:1px solid #222;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="sticky-banner">🚀 Join Telegram</div>

<div class="header">🔥 TELEBOKEP GALLERY 🔥</div>

<div class="topbar">
<a href="#" class="tg-btn jap">Japanese</a>
<a href="#" class="tg-btn indo">Indo Viral</a>
</div>

<div class="online">🟢 <span id="onlineCount">0</span> online</div>

<div id="list" class="container"></div>
<div id="pagination" class="pagination"></div>

<div class="footer">
© 2026 by Telegram
</div>

<!-- POPUP JOIN -->
<div id="popup" class="popup">
<div class="popup-box">
<h3>🚀 Join Telegram</h3>
<p style="font-size:13px;margin-top:10px;">
Wajib join untuk akses konten 🔥
</p>

<a href="#" target="_blank" class="popup-btn" onclick="joinDone()">JOIN SEKARANG</a>

<div class="close-btn">Tidak bisa ditutup</div>
</div>
</div>

<div id="toast" class="toast"></div>

<script>
document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("keydown", e=>{
if(e.keyCode==123) return false;
if(e.ctrlKey && e.shiftKey && e.keyCode==73) return false;
});

/* DATA */
const perPage=12;
let currentPage=1;
let allData=[];

fetch('data.json')
.then(r=>r.json())
.then(data=>{
allData=data.reverse();
renderPage(1);
renderPagination();
});

/* RENDER */
function renderPage(page){
const list=document.getElementById("list");
list.innerHTML="";

const start=(page-1)*perPage;
const items=allData.slice(start,start+perPage);

items.forEach(item=>{
list.innerHTML+=`
<div class="card">
<div class="img-box" data-img="${item.img}"></div>
<div class="actions">
<a href="${item.link}" target="_blank" class="btn">▶</a>
<a href="${item.link}" target="_blank" class="btn">⬇</a>
</div>
</div>`;
});

renderCanvas();
currentPage=page;
updateActive();
}

/* CANVAS (ANTI DOWNLOAD) */
function renderCanvas(){
document.querySelectorAll('.img-box').forEach(el=>{
let img=new Image();
img.src=el.dataset.img;

img.onload=()=>{
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=300;
canvas.height=200;

ctx.drawImage(img,0,0,300,200);
el.appendChild(canvas);
};
});
}

/* PAGINATION */
function renderPagination(){
const total=Math.ceil(allData.length/perPage);
const pagination=document.getElementById("pagination");
pagination.innerHTML="";

for(let i=1;i<=total;i++){
pagination.innerHTML+=`<div class="page-btn" onclick="renderPage(${i})">${i}</div>`;
}
}
function updateActive(){
document.querySelectorAll(".page-btn").forEach((btn,i)=>{
btn.classList.toggle("active",i+1===currentPage);
});
}

/* ONLINE */
let online=90;
setInterval(()=>{
online+=Math.random()*6-3;
document.getElementById("onlineCount").innerText=Math.floor(online);
},2000);

/* POPUP DELAY 3 DETIK */
setTimeout(()=>{
if(!localStorage.getItem("join")){
document.getElementById("popup").style.display="flex";
}
},3000);

function joinDone(){
localStorage.setItem("join","yes");
document.getElementById("popup").style.display="none";
}

/* TOAST */
function showToast(){
const t=document.getElementById("toast");
t.innerText=Math.floor(Math.random()*5+1)+" orang join Telegram";
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}
setInterval(showToast,7000);

/* ANTI BOT */
if(navigator.webdriver){
document.body.innerHTML="Blocked";
}
</script>

</body>
</html>
