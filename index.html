<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Access</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #050505;
  color: white;
  overflow: hidden;
}

/* PARTICLE */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MAIN */
.container {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: fadeIn 1.5s ease;
}

.btn {
  display: block;
  padding: 18px;
  margin: 15px 0;
  border-radius: 50px;
  font-size: 18px;
  font-weight: bold;
  text-decoration: none;
  border: 2px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px currentColor, 0 0 60px currentColor;
}

/* COLORS */
.japanese { color: #ff4d4d; }
.indo { color: #ff0000; }
.western { color: #4da6ff; }

/* AUTO PULSE */
.pulse {
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0px currentColor; }
  50% { box-shadow: 0 0 25px currentColor; }
  100% { box-shadow: 0 0 0px currentColor; }
}

/* TEXT */
.footer {
  margin-top: 20px;
  font-size: 14px;
  opacity: 0.7;
}

/* COUNTDOWN */
.countdown {
  margin-bottom: 15px;
  color: #ff4d4d;
  font-weight: bold;
}

/* LIVE VIEW */
.live {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 13px;
  background: rgba(0,0,0,0.7);
  padding: 8px 12px;
  border-radius: 10px;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.85);
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 14px;
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* MODAL */
.modal {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.modal-content {
  text-align: center;
  padding: 30px;
  border: 2px solid red;
  border-radius: 15px;
  box-shadow: 0 0 25px red;
}

.modal button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: red;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, -60%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LIVE VIEW -->
<div class="live" id="live">🔥 123 orang sedang melihat</div>

<!-- WARNING -->
<div class="modal" id="warning">
  <div class="modal-content">
    <h2>⚠️ 21+ ONLY</h2>
    <p>Konten khusus dewasa. Klik jika kamu cukup umur.</p>
    <button onclick="enterSite()">Saya 21+</button>
  </div>
</div>

<div class="container">

  <div class="countdown" id="countdown">
    ⏳ Akses ditutup dalam 30 detik
  </div>

  <a href="https://t.me/+ydd_4nMmWM4xMzA1" class="btn japanese pulse">
    TB JAPANESE 🇯🇵
  </a>

  <a href="https://t.me/+Oq5_fbkVFLI1NzY1" class="btn indo">
    TB INDO 🇮🇩
  </a>

  <a href="https://t.me/+lVSZPNj8WLNiNDNl" class="btn western">
    TB WESTERN 🇬🇧
  </a>

  <div class="footer">
    Limited Slot — Join Sekarang 🚀
  </div>
</div>

<script>
/* ENTER */
function enterSite() {
  document.getElementById('warning').style.display = 'none';
}

/* PARTICLE */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    d: Math.random() * 1
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });

  particles.forEach(p => {
    p.y += p.d;
    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });
}

setInterval(draw, 30);

/* FAKE LIVE VIEW */
let viewers = 120;
setInterval(() => {
  viewers += Math.floor(Math.random() * 5 - 2);
  document.getElementById("live").innerText =
    "🔥 " + viewers + " orang sedang melihat";
}, 2000);

/* FAKE JOIN */
const names = ["Budi", "Andi", "Rizky", "Dimas", "Agus", "Fajar"];
const channel = ["TB JAPANESE 🇯🇵", "TB INDO 🇮🇩", "TB WESTERN 🇬🇧"];

function showToast() {
  const toast = document.createElement("div");
  toast.className = "toast";

  const name = names[Math.floor(Math.random() * names.length)];
  const ch = channel[Math.floor(Math.random() * channel.length)];

  toast.innerText = name + " baru saja join " + ch;

  document.body.appendChild(toast);

  setTimeout(() => toast.remove(), 3000);
}

setInterval(showToast, 3000);

/* COUNTDOWN */
let time = 30;
setInterval(() => {
  time--;
  document.getElementById("countdown").innerText =
    "⏳ Akses ditutup dalam " + time + " detik";

  if (time <= 0) time = 30;
}, 1000);

/* LAST CHANCE POP */
setTimeout(() => {
  alert("⚠️ Slot hampir habis! Join sekarang sebelum ditutup!");
}, 15000);
</script>

</body>
</html>
