<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Telegram</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            cursor: pointer;
            padding: 20px;
        }

        /* Responsive Font */
        .title {
            font-size: 6vw; /* fleksibel ikut layar HP */
            margin-bottom: 20px;
        }

        .emoji {
            font-size: 10vw;
            margin: 20px 0;
        }

        .subtitle {
            font-size: 7vw;
            font-weight: bold;
            color: red;
            text-shadow: 0 0 10px red, 0 0 20px red;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px red; }
            to { text-shadow: 0 0 25px red, 0 0 40px red; }
        }

        /* Batas maksimal biar tetap enak di layar besar */
        @media (min-width: 768px) {
            .title { font-size: 32px; }
            .emoji { font-size: 45px; }
            .subtitle { font-size: 36px; }
        }
    </style>
</head>
<body>

    <div class="container" onclick="goToTelegram()">
        <div class="title">CLICK DISINI</div>
        <div class="emoji">👇👇👇</div>
        <div class="subtitle">GABUNG CHANNEL TELEGRAM</div>
    </div>

    <script>
        function goToTelegram() {
            window.location.href = "https://t.me/+eJ1uADPjbNEwYjE1";
        }
    </script>

</body>
</html>
