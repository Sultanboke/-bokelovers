<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Viral</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

.page {
    display:none;
    min-height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}
.active { display:flex; }

h1 { margin-bottom:20px; }

.btn {
    background:#eee;
    color:black;
    padding:15px;
    margin:10px;
    width:280px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

/* RESULT */
.row {
    background:#eee;
    color:black;
    width:300px;
    margin:10px;
    padding:15px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

/* TEXT */
.red { color:red; font-size:30px; }
.orange { color:orange; }
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <h2>🔞 Bokelovers</h2>
    <h1>Lebih suka Collector Apa?</h1>

    <div class="btn" onclick="vote('indo')">Asupan Indo</div>
    <div class="btn" onclick="vote('japan')">Asupan Japan</div>
    <div class="btn" onclick="vote('barat')">Asupan Barat</div>
</div>

<!-- PAGE 2 (HASIL) -->
<div id="page2" class="page">
    <h1 class="red">Hasil Voting</h1>

    <div class="row">Asupan Indo <span id="indo"></span></div>
    <div class="row">Asupan Japan <span id="japan"></span></div>
    <div class="row">Asupan Barat <span id="barat"></span></div>

    <h2 id="timer"></h2>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
    <h2 class="orange">Iklan sedang dibuka...</h2>
    <h3>Silahkan kembali ke halaman ini</h3>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page">
    <h1 class="red">⬇ klik disini ⬇</h1>
    <h1 class="red" onclick="goTG()">Join Channel Telegram</h1>
</div>

<script>

const IKLAN = "https://s.shopee.co.id/7VCDMtmdb5";
const TELEGRAM = "https://t.me/+_USPbo5cDCowM2Q1";

// ambil data
function getData(){
    let data = localStorage.getItem("survey");
    if(!data){
        let init = {
            indo: 100,
            japan: 100,
            barat: 100,
            voted: false
        };
        localStorage.setItem("survey", JSON.stringify(init));
        return init;
    }
    return JSON.parse(data);
}

// simpan
function saveData(data){
    localStorage.setItem("survey", JSON.stringify(data));
}

// vote
function vote(choice){

    let data = getData();

    if(data.voted){
        alert("Kamu sudah vote!");
        return;
    }

    data[choice] += Math.floor(Math.random()*5)+1;
    data.voted = true;

    saveData(data);

    showResult();
}

// tampil hasil
function showResult(){

    let data = getData();

    showPage("page2");

    animate("indo", data.indo);
    animate("japan", data.japan);
    animate("barat", data.barat);

    // countdown 7 detik
    let time = 7;
    let timer = setInterval(()=>{
        document.getElementById("timer").innerText = "Tunggu " + time + " detik...";
        time--;

        if(time < 0){
            clearInterval(timer);
            openAds();
        }
    },1000);
}

// animasi angka naik
function animate(id, target){
    let el = document.getElementById(id);
    let count = 0;

    let i = setInterval(()=>{
        count += Math.ceil(target/20);
        if(count >= target){
            count = target;
            clearInterval(i);
        }
        el.innerText = count;
    },50);
}

// buka iklan
function openAds(){
    window.open(IKLAN, "_blank");
    showPage("page3");

    // tunggu user balik
    setTimeout(()=>{
        showPage("page4");
    },4000);
}

// telegram
function goTG(){
    window.location.href = TELEGRAM;
}

// page switch
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
