<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telebokep Gallery</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{--main-color:#0088cc;}

html{
  scroll-behavior:smooth;
}
html, body{
  overflow-x:hidden;
  max-width:100vw;
  -webkit-overflow-scrolling:touch;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#0b0b0b;
  color:white;
  padding-top:40px;
}

/* banner */
.sticky-banner{
position:fixed;top:0;width:100%;
background:linear-gradient(90deg,#0ea5e9,#2563eb);
color:white;font-size:12px;padding:6px;
z-index:9999;overflow:hidden;white-space:nowrap;cursor:pointer;
}

.marquee{
display:inline-block;
padding-left:100%;
animation:scroll 12s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* bg */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 10%, rgba(0,150,255,0.12), transparent 70%);
z-index:-1;
}

/* header */
.header{
text-align:center;
padding:25px;
font-size:56px;
font-family:'Bebas Neue', sans-serif;
letter-spacing:4px;
color:var(--main-color);
transform:skewX(-12deg);
animation:logoPulse 2s ease-in-out infinite alternate;
}
@keyframes logoPulse{
0%{transform:skewX(-12deg) scale(1);}
100%{transform:skewX(-12deg) scale(1.04);}
}

/* online */
.online{
text-align:center;
font-size:13px;
color:#00ffc6;
margin-bottom:10px;
}

/* grid */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:12px;
}

/* card */
.card{
background:#111;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
}
.card:active{
transform:scale(0.96);
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.6);
}

/* image */
.img-box canvas{
width:100%;
height:130px;
object-fit:cover;
opacity:0;
transition:0.5s;
border-radius:10px;
}
.img-box canvas.show{
opacity:1;
}

/* watch */
.card-info{
text-align:center;
font-size:12px;
padding:6px;
background:#0ea5e9;
font-weight:600;
}

/* pagination */
#pagination{
text-align:center;
padding:10px;
}
#pagination button{
margin:3px;
padding:6px 10px;
border:none;
border-radius:6px;
background:#222;
color:#fff;
cursor:pointer;
}
#pagination .active{
background:var(--main-color);
}

/* popup */
.force-popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;align-items:center;justify-content:center;
z-index:10000;
}
.force-box{
background:#121212;
padding:25px;
border-radius:16px;
text-align:center;
width:85%;
max-width:320px;
}
.join-btn{
display:block;
margin-top:15px;
padding:12px;
border-radius:12px;
background:#0088cc;
color:white;
text-decoration:none;
font-weight:600;
}

/* preview */
.preview{
position:fixed;
top:0;left:0;width:100%;height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
z-index:9999;
}
.preview-box{
width:90%;
max-width:380px;
background:#111;
padding:20px;
border-radius:16px;
text-align:center;
}
.preview-actions{
display:flex;
gap:10px;
margin-top:15px;
}
.preview-btn{
flex:1;
padding:12px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:600;
}
.watch{background:#22c55e;}
.download{background:#3b82f6;}
.close-btn{
margin-top:12px;
font-size:13px;
opacity:0.7;
cursor:pointer;
}

/* toast */
.toast{
position:fixed;
bottom:20px;
right:-300px;
background:#111;
padding:12px;
border-radius:12px;
transition:0.5s;
}
.toast.show{right:20px;}
</style>
</head>

<body>

<div class="sticky-banner" onclick="window.open('https://t.me/+jhoktmNhrtQzYjA1')">
<div class="marquee" id="bannerText"></div>
</div>

<div class="header">TELEBOKEP</div>
<div class="online">🟢 <span id="onlineCount">0</span> online</div>

<div id="list" class="container"></div>
<div id="pagination"></div>

<!-- JOIN -->
<div class="force-popup" id="joinPopup">
<div class="force-box">
<h3>Join Telegram</h3>
<p style="font-size:12px;margin-top:10px;">
Bergabung untuk membuka akses konten.
</p>
<div style="font-size:11px;opacity:0.6;margin-top:10px;">
Akses akan terbuka setelah bergabung.
</div>
<a href="https://t.me/+jhoktmNhrtQzYjA1" target="_blank" class="join-btn" onclick="joinDone()">🚀 Join Telegram</a>
</div>
</div>

<!-- PREVIEW -->
<div id="preview" class="preview">
<div class="preview-box">
<div class="preview-text">
Nonton sekarang dan simpan video<br><br>
Gabung Telegram untuk akses penuh
</div>
<div class="preview-actions">
<a id="watchBtn" target="_blank" class="preview-btn watch">▶ WATCH</a>
<a href="https://t.me/+jhoktmNhrtQzYjA1" target="_blank" class="preview-btn download">🚀 JOIN</a>
</div>
<div class="close-btn" onclick="closePreview()">Tutup</div>
</div>
</div>

<div id="toast" class="toast"></div>

<script>
const list=document.getElementById("list");
const pagination=document.getElementById("pagination");

/* banner */
const texts=[
"🔥 Update konten setiap hari",
"🚀 Akses lebih cepat via Telegram",
"✨ Simpan halaman ini"
];
bannerText.innerText=texts[Math.floor(Math.random()*texts.length)];

let allData=[];
let currentPage=1;
let perPage=12;

/* load */
fetch('data.json')
.then(r=>r.json())
.then(data=>{
allData=data.reverse();
renderPage(1);
});

function renderPage(page){
currentPage=page;

let start=(page-1)*perPage;
let end=start+perPage;

let html="";

allData.slice(start,end).forEach(item=>{
let encoded=btoa(item.img);

html+=`
<div class="card" onclick="openPreview('${item.link}')">
<div class="img-box" data-img="${encoded}"></div>
<div class="card-info">▶ WATCH</div>
</div>`;
});

list.innerHTML=html;
renderPagination();

/* lazy load */
document.querySelectorAll('.img-box').forEach(el=>{
let observer=new IntersectionObserver(entries=>{
if(entries[0].isIntersecting){

let img=new Image();
img.src=atob(el.dataset.img);

img.onload=()=>{
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);
el.appendChild(canvas);

setTimeout(()=>canvas.classList.add("show"),50);
};

observer.disconnect();
}
});
observer.observe(el);
});
}

/* pagination */
function renderPagination(){
let totalPage=Math.ceil(allData.length/perPage);
let html="";

let max=3;

for(let i=1;i<=Math.min(max,totalPage);i++){
html+=`<button onclick="renderPage(${i})">${i}</button>`;
}

if(currentPage<totalPage){
html+=`<button onclick="renderPage(${currentPage+1})">Next ➡</button>`;
}

pagination.innerHTML=html;
}

/* popup */
function openPreview(link){
if(!localStorage.getItem("joined")){
joinPopup.style.display="flex";
return;
}
preview.style.display="flex";
watchBtn.href=link;
}
function joinDone(){
localStorage.setItem("joined","true");
joinPopup.style.display="none";
}
function closePreview(){
preview.style.display="none";
}

/* auto popup */
if(!localStorage.getItem("joined")){
setTimeout(()=>joinPopup.style.display="flex",2000);
}

/* online */
let online=120;
setInterval(()=>{
online+=Math.random()*10-5;
onlineCount.innerText=Math.floor(online);
},2000);

/* toast */
function showToast(){
let random=Math.floor(Math.random()*5)+1;
toast.innerText=random+" orang Join Telegram";
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2500);
setTimeout(showToast,4000);
}
setTimeout(showToast,3000);

</script>

</body>
</html>
