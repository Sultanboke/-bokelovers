<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT Voting</title>

<style>
body { background:black; color:white; text-align:center; font-family:Arial; }
.page { display:none; height:100vh; justify-content:center; align-items:center; flex-direction:column;}
.active { display:flex; }

.btn {
    background:white;
    color:black;
    padding:15px;
    margin:10px;
    width:250px;
    cursor:pointer;
}
</style>

</head>
<body>

<div id="page1" class="page active">
    <h1>Who's The GOAT?</h1>
    <div class="btn" onclick="vote('ronaldo')">Cristiano Ronaldo</div>
    <div class="btn" onclick="vote('messi')">Lionel Messi</div>
</div>

<div id="resultPage" class="page">
    <h2>Hasil</h2>
    <p>Ronaldo: <span id="rScore"></span></p>
    <p>Messi: <span id="mScore"></span></p>
</div>

<div id="page2" class="page">
    <h1 onclick="goTG()">JOIN TELEGRAM</h1>
</div>

<div id="page3" class="page">
    <h2>Kalah, coba lagi besok</h2>
</div>

<script type="module">

// 🔥 IMPORT FIREBASE LANGSUNG (NO FILE TERPISAH)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ⚠️ GANTI INI DENGAN PUNYA KAMU
const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_AUTH_DOMAIN",
  projectId: "ISI_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.vote = async function(choice){

    try {

        let ref = doc(db, "votes", "global");
        let snap = await getDoc(ref);

        if(!snap.exists()){
            alert("Database belum dibuat!");
            return;
        }

        let data = snap.data();

        let ronaldo = data.ronaldo;
        let messi = data.messi;

        if(choice === "ronaldo") ronaldo++;
        else messi++;

        await updateDoc(ref, {
            ronaldo: ronaldo,
            messi: messi
        });

        document.getElementById("rScore").innerText = ronaldo;
        document.getElementById("mScore").innerText = messi;

        showPage("resultPage");

        setTimeout(()=>{
            let winner = ronaldo > messi ? "ronaldo" : "messi";

            if(choice === winner){
                showPage("page2");
            } else {
                showPage("page3");
            }
        },2000);

    } catch(e){
        alert("ERROR: " + e.message);
        console.log(e);
    }

}

window.goTG = function(){
    window.location.href = "https://t.me/+_USPbo5cDCowM2Q1";
}

function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
