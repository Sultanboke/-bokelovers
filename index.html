<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusive Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* BACKGROUND */
body {
  background: #000;
  color: white;
  overflow: hidden;
}

/* PARTICLE */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
  opacity: 0.4;
}

/* LIVE */
.live {
  position: fixed;
  top: 15px;
  right: 20px;
  font-size: 12px;
  background: rgba(255,255,255,0.05);
  padding: 6px 12px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

/* MAIN */
.container {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: fadeIn 1.5s ease;
  width: 90%;
  max-width: 420px;
}

/* LOGO */
.logo {
  width: 120px;
  margin-bottom: 20px;
  opacity: 0;
  animation: logoFade 2s ease forwards, glowPulse 3s infinite ease-in-out;
}

@keyframes logoFade {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes glowPulse {
  0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
  50% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.6)); }
  100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
}

/* TEXT */
.title {
  font-size: 24px;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 25px;
}

/* BUTTON */
.btn {
  display: block;
  padding: 18px;
  margin: 10px 0;
  border-radius: 50px;
  font-size: 15px;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}

/* COLORS */
.japanese {
  color: #ff4d4d;
  background: rgba(255,77,77,0.08);
}
.indo {
  color: #ff0000;
  background: rgba(255,0,0,0.08);
}
.western {
  color: #4da6ff;
  background: rgba(77,166,255,0.08);
}

/* HOVER */
.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 25px currentColor;
}

/* SHINE */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
}

.btn:hover::before {
  left: 120%;
  transition: 0.6s;
}

/* NOTE */
.note {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
  letter-spacing: 0.5px;
}

/* MODAL */
.modal {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.modal-content {
  padding: 30px;
  border-radius: 14px;
  background: #111;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,0,0,0.4);
}

/* RED BUTTON */
.modal button {
  margin-top: 20px;
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #ff2e2e, #ff0000);
  color: white;
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 0 15px rgba(255,0,0,0.4);
}

.modal button:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 0 30px rgba(255,0,0,0.8);
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.9);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
}

/* CHAT */
.chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  max-width: 220px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 12px;
  border-radius: 14px;
  font-size: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* FADE */
@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, -60%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="live" id="live">● 132 online</div>

<!-- 21+ -->
<div class="modal" id="warning">
  <div class="modal-content">
    <h2>21+ Only</h2>
    <p style="opacity:0.6;">Restricted content</p>
    <button onclick="enterSite()">Enter</button>
  </div>
</div>

<div class="container">

  <!-- LOGO -->
  <img src="Qwww.png" class="logo" alt="logo">

  <div class="title">Private Channel Access</div>
  <div class="subtitle">Limited availability</div>

  <a href="https://t.me/+ydd_4nMmWM4xMzA1" class="btn japanese">TB JAPANESE 🇯🇵</a>
  <a href="https://t.me/+Oq5_fbkVFLI1NzY1" class="btn indo">TB INDO 🇮🇩</a>
  <a href="https://t.me/+lVSZPNj8WLNiNDNl" class="btn western">TB WESTERN 🇬🇧</a>

  <div class="note">
    Private access available — Join now
  </div>

</div>

<div class="chat" id="chat">
  💬 User dari Jakarta baru saja join
</div>

<script>
function enterSite() {
  document.getElementById('warning').style.display = 'none';
}

/* PARTICLE */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let p = [];
for (let i = 0; i < 80; i++) {
  p.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()
  });
}

setInterval(()=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  p.forEach(a=>{
    ctx.beginPath();
    ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
    ctx.fill();
    a.y+=a.d;
    if(a.y>canvas.height){a.y=0;}
  });
},30);

/* VIEWERS */
let v=120;
setInterval(()=>{
  v+=Math.floor(Math.random()*4-1);
  document.getElementById("live").innerText="● "+v+" online";
},3000);

/* TOAST */
const msgs=[
"1 orang baru join TB JAPANESE 🇯🇵",
"3 orang baru join TB INDO 🇮🇩",
"1 orang baru join TB WESTERN 🇬🇧"
];

setInterval(()=>{
  let t=document.createElement("div");
  t.className="toast";
  t.innerText=msgs[Math.floor(Math.random()*msgs.length)];
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
},4000);

/* LOCATION */
const cities=["Jakarta","Surabaya","Bandung","Makassar","Bali"];
setInterval(()=>{
  document.getElementById("chat").innerText=
  "💬 User dari "+cities[Math.floor(Math.random()*cities.length)]+" join sekarang";
},5000);
</script>

</body>
</html>
