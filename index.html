<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telebokep Gallery</title>

<link rel="manifest" href="manifest.json">

<!-- 🔥 FONT PREMIUM -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Inter:wght@400;600&family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0b0b0b;
color:white;
padding-top:40px;
}

/* 🔥 NEON SOFT BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 10%, rgba(0,150,255,0.12), transparent 70%);
z-index:-1;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
font-size:28px;
font-family:'Orbitron';
letter-spacing:2px;
color:#00c6ff;
text-shadow:0 0 12px rgba(0,198,255,0.6);
}

/* 🔥 ONLINE PREMIUM */
.online{
text-align:center;
font-size:13px;
color:#00ffc6;
margin-bottom:10px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:12px;
}

/* CARD */
.card{
background:#111;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

/* 🔥 WATCH CLEAN */
.card-info{
text-align:center;
font-size:12px;
padding:6px;
background:#0ea5e9;
font-weight:600;
}

/* 🔥 JOIN POPUP NORMAL (BALIK SEPERTI AWAL) */
.force-popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:10000;
}

.force-box{
background:#121212;
padding:25px;
border-radius:16px;
text-align:center;
width:85%;
max-width:320px;
}

.join-btn{
display:block;
margin-top:15px;
padding:12px;
border-radius:12px;
background:#0088cc;
color:white;
text-decoration:none;
font-weight:600;
}

/* 🔥 POPUP VIDEO RAPI */
.preview{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
z-index:9999;
}

.preview-box{
width:90%;
max-width:380px;
background:#111;
padding:20px;
border-radius:16px;
text-align:center;
}

.preview-text{
font-size:13px;
line-height:1.6;
margin-bottom:18px;
}

.preview-actions{
display:flex;
gap:10px;
}

.preview-btn{
flex:1;
padding:12px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:600;
}

.watch{background:#22c55e;}
.download{background:#3b82f6;}

.close-btn{
margin-top:12px;
font-size:13px;
opacity:0.7;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">TELEBOKEP</div>

<div class="online">🟢 <span id="onlineCount">0</span> online</div>

<div id="list" class="container"></div>

<!-- 🔥 JOIN TELEGRAM -->
<div class="force-popup" id="joinPopup">
  <div class="force-box">
    <h3>Join Telegram</h3>
    <p style="font-size:12px;margin-top:10px;">
      Bergabung untuk membuka akses konten.
    </p>
    <a href="https://t.me/+jhoktmNhrtQzYjA1" target="_blank" class="join-btn" onclick="joinDone()">🚀 Join Telegram</a>
  </div>
</div>

<!-- 🔥 POPUP VIDEO -->
<div id="preview" class="preview">
  <div class="preview-box">

    <div class="preview-text">
      Konten berasal dari sumber publik.<br><br>
      Lanjutkan untuk akses penuh melalui Telegram.
    </div>

    <div class="preview-actions">
      <a id="watchBtn" target="_blank" class="preview-btn watch">▶ WATCH</a>
      <a href="https://t.me/+jhoktmNhrtQzYjA1" target="_blank" class="preview-btn download">🚀 TELEGRAM</a>
    </div>

    <div class="close-btn" onclick="closePreview()">Tutup</div>

  </div>
</div>

<script>
fetch('data.json')
.then(r=>r.json())
.then(data=>{
let html="";
data.reverse().forEach(item=>{
html+=`
<div class="card" onclick="openPreview('${item.link}')">
<img src="${item.img}">
<div class="card-info">▶ WATCH</div>
</div>`;
});
list.innerHTML=html;
});

/* 🔥 FLOW NORMAL */
function openPreview(link){
if(!localStorage.getItem("joined")){
document.getElementById("joinPopup").style.display="flex";
return;
}
preview.style.display="flex";
watchBtn.href=link;
}

/* JOIN */
function joinDone(){
localStorage.setItem("joined","true");
document.getElementById("joinPopup").style.display="none";
}

/* AUTO JOIN POPUP */
if(!localStorage.getItem("joined")){
setTimeout(()=>{
document.getElementById("joinPopup").style.display="flex";
},2000);
}

/* CLOSE */
function closePreview(){
preview.style.display="none";
}

/* ONLINE */
let online=120;
setInterval(()=>{
online+=Math.random()*10-5;
onlineCount.innerText=Math.floor(online);
},2000);
</script>

</body>
</html>
