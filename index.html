<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Telegram</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    padding: 20px;
}

/* Text atas */
.top-text {
    font-size: 5vw;
    line-height: 1.5;
    font-style: italic;
}

/* GRATIS */
.gratis {
    display: block;
    margin-top: 10px;
}

/* Panah */
.arrow {
    font-size: 12vw;
    color: red;
    margin: 30px 0;
    animation: bounce 1s infinite;
}

/* Animasi panah */
@keyframes bounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(20px); }
    100% { transform: translateY(0); }
}

/* Link bawah */
.cta {
    font-size: 6vw;
    font-weight: bold;
    color: gold;
    text-decoration: none;
    line-height: 1.4;
    display: inline-block;
}

.cta:hover {
    opacity: 0.8;
}

/* Desktop fix size */
@media (min-width: 768px) {
    .top-text { font-size: 28px; }
    .arrow { font-size: 80px; }
    .cta { font-size: 32px; }
}
</style>
</head>

<body>

<div class="container">

    <div class="top-text">
        Semua Asupan <br>
        Di Channel Telegram <br>
        <span class="gratis">GRATIS</span>
    </div>

    <div class="arrow">⬇️</div>

    <a href="https://t.me/+eJ1uADPjbNEwYjE1" target="_blank" class="cta">
        Klik disini <br>
        Join Telegram
    </a>

</div>

</body>
</html>
