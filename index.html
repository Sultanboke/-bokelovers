<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telebokep Gallery</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0d0d0d;color:white;padding-top:40px;}

/* (SEMUA STYLE LAIN TETAP) */

/* ===== POPUP CLEAN ===== */
.preview{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
background:rgba(0,0,0,0.95);
}

/* LANDSCAPE PREMIUM */
.preview-box{
position:relative;
width:95%;
height:45vh;
display:flex;
align-items:center;
justify-content:center;
border-radius:14px;
background:#000;
box-shadow:0 0 30px rgba(0,0,0,0.8);
overflow:hidden;
}

/* GAMBAR FULL RAPI */
.preview-box img{
max-height:100%;
max-width:100%;
object-fit:contain;
}

/* CONTENT */
.preview-content{
position:absolute;
bottom:0;
width:100%;
padding:12px;
background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
text-align:center;
}

.cta-top{font-size:12px;margin-bottom:10px;color:#ff4d4d;}
.preview-actions{display:flex;gap:10px;}
.preview-btn{
flex:1;
padding:10px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:500;
}

.watch{background:#22c55e;}
.download{background:#3b82f6;}

.cta-bottom{font-size:11px;margin-top:8px;opacity:0.6;}
.close-btn{margin-top:10px;font-size:12px;opacity:0.6;cursor:pointer;}
</style>
</head>

<body>

<!-- (SEMUA HTML LAIN TETAP) -->

<!-- POPUP -->
<div id="preview" class="preview">
  <div class="preview-box">

    <img id="previewImg">

    <div class="preview-content">
      <p class="cta-top">🔥 Klik untuk menonton sekarang</p>

      <div class="preview-actions">
        <a id="watchBtn" target="_blank" class="preview-btn watch">▶ Watch</a>
        <a id="downloadBtn" target="_blank" class="preview-btn download">⬇ Download</a>
      </div>

      <p class="cta-bottom">💡 Kualitas terbaik & tanpa ribet</p>

      <div class="close-btn" onclick="closePreview()">Tutup</div>
    </div>

  </div>
</div>

<script>
function openPreview(img,link){
preview.style.display="flex";
previewImg.src=img;
watchBtn.href=link;
downloadBtn.href=link;
}

function closePreview(){
preview.style.display="none";
}

preview.onclick=function(e){
if(e.target.id==="preview"){
closePreview();
}
}
</script>

</body>
</html>
