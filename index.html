<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background: radial-gradient(circle at top,#111,#000);
color:#fff;
padding:20px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:26px;
font-weight:700;
background:linear-gradient(90deg,#22c55e,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
font-size:13px;
opacity:.6;
margin-top:5px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
border-radius:18px;
overflow:hidden;
backdrop-filter:blur(12px);
transition:.35s;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 15px 35px rgba(34,197,94,0.25);
}

/* IMAGE */
.img-box{
width:100%;
aspect-ratio:1/1;
overflow:hidden;
position:relative;
background:#000;
}

canvas{
width:100%;
height:100%;
display:block;
}

/* BUTTON */
.btn{
display:block;
text-align:center;
padding:8px 10px;
margin:10px;
border-radius:12px;
background:linear-gradient(135deg,#22c55e,#4ade80);
color:#fff;
text-decoration:none;
font-weight:600;
font-size:12px;
letter-spacing:.3px;
transition:.3s;
box-shadow:0 5px 15px rgba(34,197,94,0.3);
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 8px 20px rgba(34,197,94,0.5);
}
</style>
</head>

<body oncontextmenu="return false">

<div class="header">
  <h1>🔥 PREMIUM VAULT</h1>
  <p>Exclusive Content Access</p>
</div>

<div id="list" class="container"></div>

<script>

/* decode base64 */
function decode(str){
  return atob(str);
}

/* draw canvas (NO BLUR) */
function drawCanvas(canvas, url){

  const ctx = canvas.getContext("2d");
  const img = new Image();

  img.crossOrigin = "anonymous";
  img.src = url;

  img.onload = ()=>{

    const size = Math.min(img.width, img.height);

    canvas.width = size;
    canvas.height = size;

    ctx.drawImage(
      img,
      (img.width - size)/2,
      (img.height - size)/2,
      size,
      size,
      0,
      0,
      size,
      size
    );

  };

}

/* LOAD DATA */
fetch('data/data.json')
.then(r=>r.json())
.then(data=>{

  const list = document.getElementById("list");
  list.innerHTML = "";

  // 🔥 biar terbaru di atas
  data.reverse().forEach((item,i)=>{

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="img-box">
        <canvas id="c${i}"></canvas>
      </div>
      <a href="access/?id=${item.id}" class="btn">
        🔓 Unlock Now
      </a>
    `;

    list.appendChild(card);

    const canvas = document.getElementById("c"+i);
    drawCanvas(canvas, decode(item.img));

  });

})
.catch(err=>{
  console.log("JSON ERROR:", err);
});

/* block basic inspect */
document.addEventListener('keydown',e=>{
  if(e.key==="F12") e.preventDefault();
});

</script>

</body>
</html>
