<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gallery</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#0d0d0d;color:#fff;padding:15px;}

h2{text-align:center;margin-bottom:15px;letter-spacing:1px;}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

/* CARD */
.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

/* IMAGE */
.img-box{
position:relative;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
}

.img-box img{
width:100%;
height:100%;
object-fit:cover;
filter:blur(8px); /* 🔥 blur sebelum unlock */
transform:scale(1.1);
}

/* OVERLAY */
.overlay{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.4);
font-size:14px;
}

/* BUTTON */
.btn{
display:block;
text-align:center;
padding:10px;
background:#22c55e;
color:#fff;
text-decoration:none;
font-size:14px;
}

/* disable image select */
img{
pointer-events:none;
user-select:none;
-webkit-user-drag:none;
}

</style>
</head>

<body oncontextmenu="return false;"> <!-- 🔥 disable klik kanan -->

<h2>🔥 PREMIUM CONTENT 🔥</h2>

<div id="list" class="container"></div>

<script>

/* LOAD DATA */
fetch('data/data.json')
.then(r=>r.json())
.then(data=>{
  const list = document.getElementById("list");

  data.forEach(item=>{
    list.innerHTML += `
    <div class="card">
      <div class="img-box">
        <img src="${item.img}">
        <div class="overlay">🔒 Premium</div>
      </div>
      <a href="access/?id=${item.id}" class="btn">Buka Akses</a>
    </div>
    `;
  });
});

</script>

</body>
</html>
