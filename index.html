<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telebokep Gallery</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Inter:wght@400;600&family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0b0b0b;
color:white;
padding-top:40px;
}

/* 🔥 BANNER */
.sticky-banner{
position:fixed;
top:0;
width:100%;
background:linear-gradient(90deg,#0ea5e9,#2563eb);
color:white;
font-size:12px;
padding:6px;
z-index:9999;
overflow:hidden;
white-space:nowrap;
cursor:pointer;
}

.marquee{
display:inline-block;
padding-left:100%;
animation:scroll 12s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* BG */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 10%, rgba(0,150,255,0.12), transparent 70%);
z-index:-1;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
font-size:28px;
font-family:'Orbitron';
letter-spacing:2px;
color:#00c6ff;
text-shadow:0 0 12px rgba(0,198,255,0.6);
}

/* ONLINE */
.online{
text-align:center;
font-size:13px;
color:#00ffc6;
margin-bottom:10px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:12px;
}

/* CARD */
.card{
background:#111;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

/* WATCH */
.card-info{
text-align:center;
font-size:12px;
padding:6px;
background:#0ea5e9;
font-weight:600;
}

/* JOIN */
.force-popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:10000;
}

.force-box{
background:#121212;
padding:25px;
border-radius:16px;
text-align:center;
width:85%;
max-width:320px;
}

.join-btn{
display:block;
margin-top:15px;
padding:12px;
border-radius:12px;
background:#0088cc;
color:white;
text-decoration:none;
font-weight:600;
}

/* POPUP VIDEO */
.preview{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
z-index:9999;
}

.preview-box{
width:90%;
max-width:380px;
background:#111;
padding:20px;
border-radius:16px;
text-align:center;
}

.preview-text{
font-size:13px;
line-height:1.6;
margin-bottom:18px;
}

.preview-actions{
display:flex;
gap:10px;
}

.preview-btn{
flex:1;
padding:12px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:600;
}

.watch{background:#22c55e;}
.download{background:#3b82f6;}

.close-btn{
margin-top:12px;
font-size:13px;
opacity:0.7;
cursor:pointer;
}

/* 🔥 TOAST NOTIF */
.toast{
position:fixed;
bottom:20px;
left:20px;
background:#111;
padding:10px 14px;
border-radius:10px;
font-size:12px;
display:none;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<!-- 🔥 CLICKABLE BANNER -->
<div class="sticky-banner" onclick="window.open('https://t.me/+jhoktmNhrtQzYjA1')">
  <div class="marquee" id="bannerText"></div>
</div>

<div class="header">TELEBOKEP</div>

<div class="online">🟢 <span id="onlineCount">0</span> online</div>

<div id="list" class="container"></div>

<!-- JOIN -->
<div class="force-popup" id="joinPopup">
  <div class="force-box">
    <h3>Join Telegram</h3>

    <p style="font-size:12px;margin-top:10px;">
      Bergabung untuk membuka akses konten.
    </p>

    <div style="font-size:11px;opacity:0.6;margin-top:10px;">
      Akses akan terbuka setelah bergabung. Kembali ke halaman ini untuk melanjutkan.
    </div>

    <a href="https://t.me/+jhoktmNhrtQzYjA1" target="_blank" class="join-btn" onclick="joinDone()">🚀 Join Telegram</a>
  </div>
</div>

<!-- POPUP VIDEO -->
<div id="preview" class="preview">
  <div class="preview-box">

    <div class="preview-text">
      Konten berasal dari sumber publik.<br><br>
      Lanjutkan untuk akses penuh melalui Telegram.
    </div>

    <div class="preview-actions">
      <a id="watchBtn" target="_blank" class="preview-btn watch">▶ WATCH</a>
      <a href="https://t.me/+jhoktmNhrtQzYjA1" target="_blank" class="preview-btn download">🚀 TELEGRAM</a>
    </div>

    <div class="close-btn" onclick="closePreview()">Tutup</div>

  </div>
</div>

<div id="toast" class="toast"></div>

<script>

/* 🔥 RANDOM BANNER TEXT */
const texts=[
"🔥 Update konten setiap hari • Klik untuk akses cepat",
"🚀 Akses lebih cepat melalui Telegram sekarang",
"✨ Simpan halaman ini untuk update terbaru",
"💎 Konten eksklusif tersedia setiap hari"
];
bannerText.innerText=texts[Math.floor(Math.random()*texts.length)];

/* LOAD DATA */
fetch('data.json')
.then(r=>r.json())
.then(data=>{
let html="";
data.reverse().forEach(item=>{
html+=`
<div class="card" onclick="openPreview('${item.link}')">
<img src="${item.img}">
<div class="card-info">▶ WATCH</div>
</div>`;
});
list.innerHTML=html;
});

/* FLOW */
function openPreview(link){
if(!localStorage.getItem("joined")){
joinPopup.style.display="flex";
return;
}
preview.style.display="flex";
watchBtn.href=link;
}

function joinDone(){
localStorage.setItem("joined","true");
joinPopup.style.display="none";
}

if(!localStorage.getItem("joined")){
setTimeout(()=>{joinPopup.style.display="flex"},2000);
}

function closePreview(){
preview.style.display="none";
}

/* ONLINE */
let online=120;
setInterval(()=>{
online+=Math.random()*10-5;
onlineCount.innerText=Math.floor(online);
},2000);

/* 🔥 NOTIF JOIN COUNTER */
let count=1;
setInterval(()=>{
toast.innerText=count+" orang Join Telegram";
toast.style.display="block";
setTimeout(()=>toast.style.display="none",2500);
count++;
setInterval(()=>{
let random = Math.floor(Math.random()*5)+1; // angka 1 - 5 acak

toast.innerText = random + " orang Join Telegram";
toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},2500);

},5000);

</script>

</body>
</html>
