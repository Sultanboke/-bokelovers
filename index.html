<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusive Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at 20% 20%, #0a0a0a, #000);
  color: white;
  overflow: hidden;
}

/* PARTICLE */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* LIVE VIEW */
.live {
  position: fixed;
  top: 15px;
  right: 20px;
  font-size: 12px;
  opacity: 0.85;
  background: rgba(255,255,255,0.05);
  padding: 6px 12px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

/* MAIN */
.container {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: fadeIn 1.5s ease;
  width: 90%;
  max-width: 420px;
}

/* TEXT */
.title {
  font-size: 24px;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 25px;
}

/* BUTTON */
.btn {
  display: block;
  padding: 18px;
  margin: 10px 0;
  border-radius: 50px;
  font-size: 15px;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}

/* COLORS */
.japanese {
  color: #ff4d4d;
  background: linear-gradient(120deg, rgba(255,77,77,0.15), transparent);
}
.indo {
  color: #ff0000;
  background: linear-gradient(120deg, rgba(255,0,0,0.15), transparent);
}
.western {
  color: #4da6ff;
  background: linear-gradient(120deg, rgba(77,166,255,0.15), transparent);
}

/* HOVER */
.btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 0 30px currentColor;
}

/* SHINE */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transform: skewX(-20deg);
}

.btn:hover::before {
  left: 120%;
  transition: 0.6s;
}

/* MODAL */
.modal {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.modal-content {
  padding: 30px;
  border-radius: 14px;
  background: #111;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,0,0,0.4);
}

.modal button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: #ff4d4d;
  color: white;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.85);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  animation: slideUp 0.4s;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* CHAT */
.chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  max-width: 220px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 12px;
  border-radius: 14px;
  font-size: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, -60%) scale(0.95); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* PULSE */
.pulse {
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="live" id="live">● 132 online</div>

<!-- 21+ -->
<div class="modal" id="warning">
  <div class="modal-content">
    <h2>21+ Only</h2>
    <p style="opacity:0.6;">Restricted content</p>
    <button onclick="enterSite()">Enter</button>
  </div>
</div>

<div class="container">

  <div class="title">Private Channel Access</div>
  <div class="subtitle">Limited availability</div>

  <a href="https://t.me/+ydd_4nMmWM4xMzA1" class="btn japanese" onclick="track('japanese')">
    TB JAPANESE 🇯🇵
  </a>

  <a href="https://t.me/+Oq5_fbkVFLI1NzY1" class="btn indo" onclick="track('indo')">
    TB INDO 🇮🇩
  </a>

  <a href="https://t.me/+lVSZPNj8WLNiNDNl" class="btn western" onclick="track('western')">
    TB WESTERN 🇬🇧
  </a>

</div>

<div class="chat" id="chat">
  💬 User dari Jakarta baru saja join
</div>

<script>
function enterSite() {
  document.getElementById('warning').style.display = 'none';
}

/* PARTICLE */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let p = [];

for (let i = 0; i < 80; i++) {
  p.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    d: Math.random()
  });
}

setInterval(() => {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  p.forEach(a=>{
    ctx.beginPath();
    ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
    ctx.fill();
    a.y+=a.d;
    if(a.y>canvas.height){a.y=0;}
  });
},30);

/* VIEWERS */
let v=120;
setInterval(()=>{
  v+=Math.floor(Math.random()*4-1);
  document.getElementById("live").innerText="● "+v+" online";
},3000);

/* TOAST */
const msgs=[
"1 orang baru join TB JAPANESE 🇯🇵",
"3 orang baru join TB INDO 🇮🇩",
"1 orang baru join TB WESTERN 🇬🇧"
];

setInterval(()=>{
  let t=document.createElement("div");
  t.className="toast";
  t.innerText=msgs[Math.floor(Math.random()*msgs.length)];
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
},4000);

/* LOCATION STYLE */
const cities=["Jakarta","Surabaya","Bandung","Makassar","Bali"];
setInterval(()=>{
  document.getElementById("chat").innerText=
  "💬 User dari "+cities[Math.floor(Math.random()*cities.length)]+" join sekarang";
},5000);

/* TRACK */
function track(type){
  console.log("Klik:",type);
}

/* MICRO EFFECT */
document.querySelectorAll(".btn").forEach(btn => {
  btn.addEventListener("mousemove", e => {
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    btn.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.15), transparent)`;
  });
  btn.addEventListener("mouseleave", () => {
    btn.style.background = "";
  });
});

/* PULSE */
setInterval(()=>{
  document.querySelector(".btn").classList.toggle("pulse");
},2000);
</script>

</body>
</html>
