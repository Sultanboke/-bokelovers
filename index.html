<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background: radial-gradient(circle at top,#111,#000);
color:#fff;
padding:20px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:26px;
font-weight:700;
background:linear-gradient(90deg,#22c55e,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
font-size:13px;
opacity:.6;
margin-top:5px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:16px;
overflow:hidden;
backdrop-filter:blur(10px);
transition:.3s;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.card:hover{
transform:translateY(-4px) scale(1.02);
}

/* IMAGE */
.img-box{
width:100%;
aspect-ratio:1/1;
overflow:hidden;
position:relative;
background:#000;
}

canvas{
width:100%;
height:100%;
display:block;
}

/* OVERLAY */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
display:flex;
align-items:flex-end;
justify-content:center;
padding:10px;
font-size:12px;
opacity:.8;
}

/* BUTTON */
.btn{
display:block;
text-align:center;
padding:12px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:#fff;
text-decoration:none;
font-weight:600;
font-size:13px;
}

</style>
</head>

<body oncontextmenu="return false">

<div class="header">
  <h1>🔥 PREMIUM VAULT</h1>
  <p>Exclusive Content Access</p>
</div>

<div id="list" class="container"></div>

<script>

/* decode base64 */
function decode(str){
  return atob(str);
}

/* DRAW IMAGE (FIX IMPORTANT) */
function drawCanvas(canvas, url){

  const ctx = canvas.getContext("2d");
  const img = new Image();

  img.crossOrigin = "anonymous";
  img.src = url;

  img.onload = ()=>{

    // 🔥 FIX BIAR SEMUA TAMPIL & TIDAK BLUR
    const size = Math.min(img.width, img.height);

    canvas.width = size;
    canvas.height = size;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(
      img,
      (img.width - size)/2,
      (img.height - size)/2,
      size,
      size,
      0,
      0,
      size,
      size
    );

  };

  img.onerror = ()=>{
    console.log("Image failed:", url);
  };
}

/* LOAD DATA */
fetch('data/data.json')
.then(r=>r.json())
.then(data=>{

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((item,i)=>{

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="img-box">
        <canvas id="c${i}"></canvas>
        <div class="overlay">Premium Locked</div>
      </div>
      <a href="access/?id=${item.id}" class="btn">Unlock Access</a>
    `;

    list.appendChild(card);

    const canvas = document.getElementById("c"+i);

    drawCanvas(canvas, decode(item.img));

  });

})
.catch(err=>{
  console.log("JSON ERROR:", err);
});

/* BLOCK BASIC */
document.addEventListener('keydown',e=>{
  if(e.key==="F12") e.preventDefault();
});

</script>

</body>
</html>
