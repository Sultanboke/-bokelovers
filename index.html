<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Telegram</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
  overflow: hidden;
}

/* PARTICLE */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MAIN */
.container {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: fadeIn 1.5s ease-in-out;
}

/* BUTTON */
.btn {
  display: block;
  text-decoration: none;
  padding: 18px;
  margin: 15px 0;
  border-radius: 50px;
  font-size: 18px;
  font-weight: bold;
  transition: 0.3s;
  border: 2px solid rgba(255,255,255,0.2);
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
}

/* COLORS */
.japanese { color: #ff4d4d; }
.indo { color: #ff0000; }
.western { color: #4da6ff; }

.footer {
  margin-top: 30px;
  font-size: 14px;
  opacity: 0.6;
}

/* FADE */
@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, -60%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.modal-content {
  text-align: center;
  padding: 30px;
  border: 2px solid red;
  border-radius: 15px;
  box-shadow: 0 0 20px red;
}

.modal button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: red;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* NOTIFICATION */
.toast {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.8);
  padding: 12px 18px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 14px;
  animation: slideUp 0.5s ease;
}

@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- WARNING -->
<div class="modal" id="warning">
  <div class="modal-content">
    <h2>⚠️ 21+ ONLY</h2>
    <p>Konten hanya untuk usia 21 tahun ke atas</p>
    <button onclick="enterSite()">Saya 21+</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <a href="https://t.me/+ydd_4nMmWM4xMzA1" class="btn japanese">
    TB JAPANESE 🇯🇵
  </a>

  <a href="https://t.me/+Oq5_fbkVFLI1NzY1" class="btn indo">
    TB INDO 🇮🇩
  </a>

  <a href="https://t.me/+lVSZPNj8WLNiNDNl" class="btn western">
    TB WESTERN 🇬🇧
  </a>

  <div class="footer">
    Limited Access — Join Now 🚀
  </div>
</div>

<script>
/* REMOVE WARNING */
function enterSite() {
  document.getElementById('warning').style.display = 'none';
}

/* PARTICLE */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    d: Math.random() * 1
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
    ctx.fill();
  });

  update();
}

function update() {
  particles.forEach(p => {
    p.y += p.d;
    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });
}

setInterval(draw, 33);

/* FAKE NOTIFICATION */
const messages = [
  "1 orang baru join TB JAPANESE 🇯🇵",
  "2 orang baru join TB INDO 🇮🇩",
  "1 orang baru join TB WESTERN 🇬🇧",
  "3 orang baru join TB JAPANESE 🇯🇵",
  "2 orang baru join TB WESTERN 🇬🇧"
];

function showToast() {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerText = messages[Math.floor(Math.random() * messages.length)];

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}

setInterval(showToast, 4000);
</script>

</body>
</html>
